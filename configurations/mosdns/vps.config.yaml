log:
  level: erro #info debug
  file: "/var/log/mosdns.log"

plugins:
  ## 域名劫持
  - tag: "local_hosts"
    type: "hosts"
    args:
      entries:
        #- "full:test.${domain} 192.168.2.3"
        - "time.android.com 203.107.6.88"

  ## 黑名单域名
  - tag: "blocked_domain"
    type: "domain_set"
    args:
      files:
        - "/usr/local/etc/mosdns/rules/geosite_xiaomi-ads.txt"

  ## 国外流媒体域名
  - tag: "streaming_media_domains"
    type: "domain_set"
    args:
      files:
        - "/usr/local/etc/mosdns/rules/geosite_netflix.txt"

  ## 缓存
  - tag: "lazy_cache"
    type: "cache"
    args:
      size: 20480
      lazy_cache_ttl: 86400

  ## 转发至上游服务器
  - tag: "forward_local"
    type: "forward"
    args:
      concurrent: 2
      upstreams:
        - tag: "Cloudflare DOT"
          addr: "tls://one.one.one.one"
          dial_addr: "1.1.1.1"
          enable_pipeline: true
        - tag: "Google DOT"
          addr: "tls://dns.google"
          dial_addr: "8.8.8.8"
          enable_pipeline: true
        #- tag: Google DOH
        #  addr: "https://dns.google/dns-query"
        #  dial_addr: "8.8.8.8"
        #  socks5: "127.0.0.1:1081"
        #- tag: Cloudflare DOH
        #  addr: "https://cloudflare-dns.com/dns-query"
        #  dial_addr: "104.16.248.249"
        #  socks5: "127.0.0.1:1081"
          
  ## 转发至国外流媒体专用服务器
  - tag: "forward_remote_streaming_media"
    type: "forward"
    args:
      upstreams:
        - addr: "${netflix_dns}"
          dial_addr: "${netflix_dns}"

  ## 有响应终止返回
  - tag: "has_resp_test"
    type: "sequence"
    args:
      - matches: has_resp
        exec: accept

  ## 查询黑名单
  - tag: "query_is_blocked"
    type: "sequence"
    args:
      - matches: qname $blocked_domain
        exec: reject

  ## 查询缓存
  - tag: "query_in_cache"
    type: "sequence"
    args:
      - matches: "!qname ${domain}"
        exec: $lazy_cache

  ## 解析国外流媒体域名
  - tag: "resolve_treaming_media_domains"
    type: "sequence"
    args:
      - matches: qname $streaming_media_domains
        exec: $forward_remote_streaming_media

  ## 国外解析域名
  - tag: "remote_resolve_sequence"
    type: "sequence"
    args:
      - exec: $forward_remote
      - matches: "resp_ip $geoip_cn"
        exec: drop_resp

  ## 主要的运行逻辑插件
  ## sequence 插件中调用的插件 tag 必须在 sequence 前定义，
  ## 否则 sequence 找不到对应插件。
  - tag: main_sequence
    type: sequence
    args:
      ### 优先使用IPv4
      #- exec: prefer_ipv4
      ## 黑名单
      - exec: $query_is_blocked
      - exec: jump has_resp_test
      ## 域名劫持
      - exec: $local_hosts
      - exec: jump has_resp_test
      ## 查询缓存
      - exec: $query_in_cache
      - exec: jump has_resp_test
      ## 解析国外流媒体域名
      - exec: $resolve_treaming_media_domains
      - exec: jump has_resp_test
      ## 国外解析域名，返回国内IP则丢弃
      - exec: $remote_resolve_sequence
      - exec: jump has_resp_test

  ## 启动 udp 服务器
  - tag: udp_server
    type: udp_server
    args:
      entry: main_sequence
      listen: ":53"

  ## 启动 tcp 服务器
  - tag: tcp_server
    type: tcp_server
    args:
      entry: main_sequence
      listen: ":53"
